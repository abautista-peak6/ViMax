chat_model:
  init_args:
    model: gemini-3.1-pro-preview
    model_provider: google_vertex
    project: p6s-p6strat-abautista-dev
    location: global
  # Rate limits for chat model API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 4
  max_requests_per_day: 2000

image_generator:
  class_path: tools.ImageGeneratorNanobananaGoogleAPI
  init_args:
    project: p6s-p6strat-abautista-dev
    location: global
    model: gemini-3-pro-image-preview
  # Rate limits for image generation API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 10
  max_requests_per_day: 500


video_generator:
  class_path: tools.VideoGeneratorVeoGoogleAPI
  init_args:
    project: p6s-p6strat-abautista-dev
    location: global
    t2v_model: veo-3.1-generate-001
    ff2v_model: veo-3.1-generate-001
    flf2v_model: veo-3.1-generate-001
    generate_audio: true
    person_generation: allow_adult
    output_gcs_uri:
  # Rate limits for video generation API calls
  # Set to null to disable rate limiting for this service
  max_requests_per_minute: 2
  max_requests_per_day:


working_dir: .working_dir/idea2video
